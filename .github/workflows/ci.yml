name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  architecture:
    name: Architecture
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run architecture check
        run: npm run architecture:check

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/filtrovali?schema=public
      TRUST_PROXY: "false"
      SIGNATURE_TOKEN_SECRET: ci-signature-token-secret
      SURVEY_TOKEN_SECRET: ci-survey-token-secret
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate audit report
        run: |
          mkdir -p ../audit-reports
          npm audit --audit-level=high --json > ../audit-reports/backend-audit.json

      - name: Upload backend audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-audit
          path: audit-reports/backend-audit.json
          if-no-files-found: warn

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Run backend tests
        run: npm test

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate audit report
        run: |
          mkdir -p ../audit-reports
          npm audit --audit-level=high --json > ../audit-reports/frontend-audit.json

      - name: Upload frontend audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-audit
          path: audit-reports/frontend-audit.json
          if-no-files-found: warn

      - name: Run frontend tests
        run: npm test

      - name: Run frontend lint
        run: npm run lint

      - name: Build frontend
        run: npm run build

  docker:
    name: Docker
    runs-on: ubuntu-latest
    env:
      STAGING_POSTGRES_PASSWORD: ci-staging-postgres-password
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare build env files
        run: touch backend/.env.staging

      - name: Build staging images
        run: docker compose -f docker-compose.staging.yml build backend nginx
