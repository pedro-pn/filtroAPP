name: filtrovali-staging

services:
  postgres:
    image: postgres:16-alpine
    container_name: filtrovali-staging-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: filtrovali
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${STAGING_POSTGRES_PASSWORD:?STAGING_POSTGRES_PASSWORD is required. Use --env-file backend/.env.staging or export it before running docker compose.}
    volumes:
      - filtrovali_staging_pgdata:/var/lib/postgresql/data
    networks:
      - filtrovali-staging-net

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: filtrovali-staging-backend
    restart: unless-stopped
    env_file:
      - backend/.env.staging
    depends_on:
      - postgres
    volumes:
      - filtrovali_staging_relatorios:/data/relatorios
    networks:
      - filtrovali-staging-net

  nginx:
    build:
      context: .
      dockerfile: deploy/nginx/Dockerfile
    container_name: filtrovali-staging-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
    volumes:
      - ./deploy/nginx/staging.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - filtrovali-staging-net

volumes:
  filtrovali_staging_pgdata:
    name: filtrovali_staging_pgdata
  filtrovali_staging_relatorios:
    name: filtrovali_staging_relatorios

networks:
  filtrovali-staging-net:
    name: filtrovali-staging-net
    driver: bridge
