services:
  postgres:
    image: postgres:16-alpine
    container_name: filtrovali-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: filtrovali
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - filtrovali_pgdata:/var/lib/postgresql/data

volumes:
  filtrovali_pgdata:
