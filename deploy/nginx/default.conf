  resolver 127.0.0.11 valid=30s ipv6=off;
                                                                                           
  server {                                                                                 
    listen 80;                                                                             
    server_name relatorios.filtrovali.com.br;                                              

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }
                                                                                           
    location / {
      return 301 https://$host$request_uri;
    }                                                                                      
  }

  server {
    listen 443 ssl;
    server_name relatorios.filtrovali.com.br;

    ssl_certificate /etc/letsencrypt/live/relatorios.filtrovali.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/relatorios.filtrovali.com.br/privkey.pem;

    client_max_body_size 30M;

    # React SPA (app_v2_react) rodando em container separado na mesma rede
    location = /react {
      return 301 /react/;
    }

    location /react/ {
      set $react http://filtrovali-react:80;
      proxy_pass $react;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /react/api/ {
        set $backend_react http://filtrovali-backend-react:4000;
        rewrite ^/react(/api/.*) $1 break;
        proxy_pass $backend_react;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
  }
