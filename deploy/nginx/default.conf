  upstream filtrovali_backend {                                                            
    server backend:4000;                                                                   
  }                                                                                        
                                                                                           
  server {                                                                                 
    listen 80;                                                                             
    server_name relatorios.filtrovali.com.br;                                              

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }
                                                                                           
    location / {
      return 301 https://$host$request_uri;
    }                                                                                      
  }

  server {
    listen 443 ssl;
    server_name relatorios.filtrovali.com.br;

    ssl_certificate /etc/letsencrypt/live/relatorios.filtrovali.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/relatorios.filtrovali.com.br/privkey.pem;

    client_max_body_size 30M;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
      proxy_pass http://filtrovali_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    location /assets/ {
      proxy_pass http://filtrovali_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
      proxy_pass http://filtrovali_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /relatorios/ {
      proxy_pass http://filtrovali_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /legacy {
      proxy_pass http://filtrovali_backend/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /legacy/reset-password {
      proxy_pass http://filtrovali_backend/reset-password;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      try_files $uri $uri/ /index.html;
    }

    location = /health {
      proxy_pass http://filtrovali_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
