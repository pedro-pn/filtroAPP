resolver 127.0.0.11 valid=30s ipv6=off;

server {
  listen 80;
  server_name app.filtrovali.com.br;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 80;
  server_name relatorios.filtrovali.com.br;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location = / {
    return 301 https://app.filtrovali.com.br/rdo;
  }

  location / {
    return 301 https://app.filtrovali.com.br$request_uri;
  }
}

server {
  listen 443 ssl;
  server_name relatorios.filtrovali.com.br;

  ssl_certificate /etc/letsencrypt/live/relatorios.filtrovali.com.br/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/relatorios.filtrovali.com.br/privkey.pem;

  location = / {
    return 301 https://app.filtrovali.com.br/rdo;
  }

  location / {
    return 301 https://app.filtrovali.com.br$request_uri;
  }
}

server {
  listen 443 ssl;
  server_name app.filtrovali.com.br;

  root /usr/share/nginx/html;

  ssl_certificate /etc/letsencrypt/live/relatorios.filtrovali.com.br/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/relatorios.filtrovali.com.br/privkey.pem;

  client_max_body_size 30M;

  location /api/ {
    set $backend http://backend:4000;
    proxy_pass $backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

  location = /api {
    set $backend http://backend:4000;
    proxy_pass $backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /assets/ {
    try_files $uri @backend;
  }

  location /uploads/ {
    set $backend http://backend:4000;
    proxy_pass $backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /relatorios/ {
    set $backend http://backend:4000;
    proxy_pass $backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /health {
    set $backend http://backend:4000;
    proxy_pass $backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location @backend {
    set $backend http://backend:4000;
    proxy_pass $backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
