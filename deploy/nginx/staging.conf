resolver 127.0.0.11 valid=30s ipv6=off;

# Restrição de acesso por IP.
# Adicione o IP do escritório, VPN ou máquinas autorizadas antes de subir o ambiente.
# Formato: allow X.X.X.X;  ou  allow X.X.X.X/CIDR;
# Qualquer IP não listado receberá 403.

geo $staging_allowed {
    default         0;
    127.0.0.1       1;
    # 177.x.x.x    1;  # exemplo: IP fixo do escritório
    # 10.0.0.0/8   1;  # exemplo: rede VPN interna
}

server {
  listen 80;
  server_name app.filtrovali.com.br;

  root /usr/share/nginx/html;

  client_max_body_size 30M;

  # Bloqueia IPs não autorizados antes de qualquer processamento.
  if ($staging_allowed = 0) {
    return 403;
  }

  # Cabeçalho para identificar respostas do ambiente de homologação.
  add_header X-Environment "staging" always;

  location /api/ {
    set $backend http://backend:4000;
    proxy_pass $backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_connect_timeout 15s;
    proxy_send_timeout 75s;
    proxy_read_timeout 75s;
  }

  location = /api {
    set $backend http://backend:4000;
    proxy_pass $backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 15s;
    proxy_send_timeout 75s;
    proxy_read_timeout 75s;
  }

  location /assets/ {
    try_files $uri @backend;
  }

  location /uploads/ {
    set $backend http://backend:4000;
    proxy_pass $backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 15s;
    proxy_send_timeout 75s;
    proxy_read_timeout 75s;
  }

  location /relatorios/ {
    set $backend http://backend:4000;
    proxy_pass $backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 15s;
    proxy_send_timeout 75s;
    proxy_read_timeout 75s;
  }

  location /certificados-calibracao/ {
    set $backend http://backend:4000;
    proxy_pass $backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 15s;
    proxy_send_timeout 75s;
    proxy_read_timeout 75s;
  }

  location = /health {
    set $backend http://backend:4000;
    proxy_pass $backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 15s;
    proxy_send_timeout 75s;
    proxy_read_timeout 75s;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location @backend {
    set $backend http://backend:4000;
    proxy_pass $backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 15s;
    proxy_send_timeout 75s;
    proxy_read_timeout 75s;
  }
}
