server {
    listen 80;

    root /usr/share/nginx/html;

    # Redirect /react sem barra final
    location = /react {
        return 301 /react/;
    }

    # SPA: tenta o arquivo estático, cai no index.html para rotas do React Router
    location /react/ {
        try_files $uri $uri/ /react/index.html;
    }

    # Bloqueia qualquer outro caminho
    location / {
        return 404;
    }
}
