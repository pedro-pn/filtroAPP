server {
    listen 80;
    resolver 127.0.0.11 valid=30s ipv6=off;

    root /usr/share/nginx/html;
    client_max_body_size 30M;

    # Redirect /react sem barra final
    location = /react {
        return 301 /react/;
    }

    # API do React → backend-react (remove prefixo /react antes de repassar)
    location /react/api/ {
        set $backend_react http://filtrovali-backend-react:4000;
        rewrite ^/react(/api/.*) $1 break;
        proxy_pass $backend_react;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # SPA: tenta o arquivo estático, cai no index.html para rotas do React Router
    location /react/ {
        try_files $uri $uri/ /react/index.html;
    }

    # Bloqueia qualquer outro caminho
    location / {
        return 404;
    }
}
